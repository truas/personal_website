<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teaching - PD Dr. Terry Ruas</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

  <header class="navbar"></header>

  <main class="container">
    <h1>Teaching</h1>
    <p>
      Courses I have taught or assisted with — filter by year, institution, or role.
    </p>

    <section class="publications-container" aria-label="Teaching">
      <div class="pubs-toolbar">
        <label class="pubs-search" for="teach-search-input">
          <span class="pubs-search-icon" aria-hidden="true"><i class="fa-solid fa-magnifying-glass"></i></span>
          <input id="teach-search-input" type="search" placeholder="Search by course, code, institution, or term…" autocomplete="off" aria-label="Search courses" />
          <button id="teach-search-clear" class="pubs-clear" type="button" aria-label="Clear search">✕</button>
        </label>
        <div id="teach-year-chips" class="pubs-filter-group" role="group" aria-label="Filter by year"></div>
        <div id="teach-institution-chips" class="pubs-filter-group" role="group" aria-label="Filter by institution"></div>
        <div id="teach-role-chips" class="pubs-filter-group" role="group" aria-label="Filter by role"></div>
      </div>

      <p id="teach-stats" class="pubs-stats" aria-live="polite"></p>

      <div id="teaching-list"></div>
    </section>
  </main>

  <footer class="footer"></footer>

  <script src="js/load-dynamic-content.js"></script>
  <script src="js/teaching.js" defer></script>
</body>
</html>
